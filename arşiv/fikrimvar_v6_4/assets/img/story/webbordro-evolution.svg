  <g transform="translate(120 110)"><circle cx="40" cy="170" r="26" fill="#d09a47"/><rect x="0" y="0" width="250" height="130" rx="14" fill="#ece3d3"/><text x="24" y="38" font-size="18" fill="#1b1a18">01 · PYTHON</text><text x="24" y="72" font-size="24" fill="#1b1a18">İlk geniş sürüm</text><text x="24" y="102" font-size="15" fill="#6c6257">izin · tazminat · personel</text></g>
