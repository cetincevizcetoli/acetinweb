<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720"><rect width="1200" height="720" fill="#efe5d4"/><g font-family="IBM Plex Mono, monospace" font-size="24" fill="#231b16"><text x="100" y="100">ATÖLYE</text><text x="500" y="100">ŞABLON</text><text x="900" y="100">HİKÂYE</text></g><g fill="#17130f"><rect x="80" y="150" width="240" height="120" rx="8"/><rect x="480" y="150" width="240" height="120" rx="8"/><rect x="880" y="150" width="240" height="120" rx="8"/></g><g font-family="Georgia, serif" font-size="34" fill="#f6efe3"><text x="115" y="220">Ham kayıt</text><text x="515" y="220">Kayıt türü</text><text x="925" y="220">Bölüm</text></g><path d="M330 210 H460 M730 210 H860" stroke="#c45a36" stroke-width="6" marker-end="url(#a)"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#c45a36"/></marker></defs><g font-family="Inter, sans-serif" font-size="24" fill="#5c5147"><text x="105" y="370">Günlük, deneme, sorun, karar, medya, kaynak</text><text x="105" y="430">Her kayıt hikâyeye ne olarak taşınacağını bilir.</text><text x="105" y="490">Builder bu bilgiyi kullanıp doğru bölüm iskeletini kurar.</text></g></svg>