<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720"><rect width="1200" height="720" fill="#efe5d4"/><g font-family="IBM Plex Mono, monospace" font-size="22" fill="#231b16"><text x="80" y="92">SIPARIS</text><text x="430" y="92">URETIMDE</text><text x="800" y="92">TESLIM</text></g><g fill="#17130f"><rect x="70" y="150" width="280" height="130" rx="8"/><rect x="420" y="150" width="280" height="130" rx="8"/><rect x="790" y="150" width="280" height="130" rx="8"/></g><g font-family="Georgia, serif" font-size="31" fill="#f6efe3"><text x="104" y="224">Bekleyen</text><text x="458" y="224">Atolyede</text><text x="830" y="224">Biten</text></g><path d="M360 215 H410 M710 215 H780" stroke="#c45a36" stroke-width="6"/><g font-family="Inter, sans-serif" font-size="24" fill="#5c5147"><text x="90" y="390">Ilk taslakta rapor yok. Sadece is kartinin nerede durdugu gorunuyor.</text><text x="90" y="445">Usta telefonda cevap vermek yerine karti bir sutundan digerine surukleyecek.</text><text x="90" y="500">Hikayede bu gorsel, karar aninin kaniti olarak kullanilacak.</text></g></svg>