<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720"><rect width="1200" height="720" fill="#efe5d4"/><g font-family="IBM Plex Mono, monospace" font-size="22" fill="#231b16"><text x="80" y="92">01 HAM KAYIT</text><text x="430" y="92">02 KAYIT TÜRÜ</text><text x="790" y="92">03 HİKÂYE BÖLÜMÜ</text></g><g fill="#17130f"><rect x="70" y="150" width="270" height="130" rx="8"/><rect x="425" y="150" width="270" height="130" rx="8"/><rect x="780" y="150" width="330" height="130" rx="8"/></g><g font-family="Georgia, serif" font-size="33" fill="#f6efe3"><text x="104" y="224">Deneme</text><text x="470" y="224">Sorun / Karar</text><text x="830" y="224">Sahne / Ders</text></g><path d="M350 215 H410 M705 215 H765" stroke="#c45a36" stroke-width="6"/><g font-family="Inter, sans-serif" font-size="24" fill="#5c5147"><text x="90" y="390">Bu demo özellikle her kayıt türünün farklı işe yaradığını gösterir.</text><text x="90" y="445">Günlük not bağlam verir; sorun gerilim kurar; karar yön değiştirir.</text><text x="90" y="500">Medya kanıt olur; kaynak dış referans olur; builder bunları bölümlere çevirir.</text></g></svg>